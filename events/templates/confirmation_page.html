<!-- This is the confirmation page template. This includes information from an event registered for, and includes a button to return to the event list. It uses a confirmation_details function and is given the registration id from a regitration made. -->
<h1>Confirmation Page</h1>
<p1>You have registered for {{ registration.event.title }}, {{ registration.event.date }} {{ registration.event.time }} at {{ registration.event.location }}!</p1>
<form method="POST">
    {% csrf_token %}
    <button type='submit'>Return to List</button>
</form>
