<!-- This uses the register_for_event function to populate the page, it uses an event_id given previously and accepts input for the name and email. -->
<h1>Registration Page for {{ event.title }}!</h1>
<form method="POST">
    {% csrf_token %}

    <label for="name">Name:</label>
    <input type="text" name="name" required>

    <label for="email">Email:</label>
    <input type="email" name="email" required>

    <button type='submit'>Register</button>
</form>
