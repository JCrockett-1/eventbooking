<h1>Registration Page for {{ event.title }}!</h1>
<form method="POST">
    {% csrf_token %}

    <label for="name">Name:</label>
    <input type="text" name="name" required>

    <label for="email">Email:</label>
    <input type="email" name="email" required>

    <button type='submit'>Register</button>
</form>
