<!-- This is the event list template. It uses the event_list function to get it's info. and includes a link to the registration page of each event. -->
<h1>Event List!</h1>
<ul>
    {% for event in events %}
        <li>
            <strong>{{ event.title }}</strong> - {{ event.location }} - {{ event.date }} - {{ event.time }}
            <a href="{% url 'registration' event.id %}">Register</a>
        </li>
    {% endfor %}
</ul>
